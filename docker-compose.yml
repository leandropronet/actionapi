services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-actionapi}
      POSTGRES_USER: ${PG_USER:-actionapi}
      POSTGRES_PASSWORD: ${PG_PASS}
    ports:
      - "${PG_BIND_HOST:-127.0.0.1}:${PG_EXPOSE_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - actionapi-net
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-actionapi} -d ${PG_DATABASE:-actionapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl-service:
    build:
      context: ./packages/etl
      dockerfile: Dockerfile
    env_file: .env.docker
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - actionapi-net
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    volumes:
      - etl_logs:/app/logs
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "10"

  actionapi:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PORT:-3000}:3000"
    env_file: .env.docker
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - actionapi-net
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  pg_data:
  etl_logs:

networks:
  actionapi-net:
    name: actionapi-net
